<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>筆順讀音</title>
<meta name="theme-color" content="#1857b8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="筆順讀音">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{height:100%;}
  body{margin:0;font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;
       background:#eef2f8;color:#1f2933;display:flex;flex-direction:column;
       min-height:100%;min-height:100svh;min-height:100dvh;
       -webkit-user-select:none;user-select:none;overscroll-behavior:none;
       -webkit-text-size-adjust:100%;}

  /* App bar */
  .appbar{position:sticky;top:0;z-index:10;
          background:linear-gradient(135deg,#2a7de1,#1857b8);color:#fff;
          padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
          box-shadow:0 2px 12px rgba(20,60,120,.20);
          display:flex;align-items:center;gap:10px;}
  .appbar .logo{font-size:24px;line-height:1;}
  .appbar h1{margin:0;font-size:19px;font-weight:700;letter-spacing:2px;}
  .appbar .sub{margin-left:auto;font-size:12px;opacity:.85;}

  /* Main */
  main{flex:1;width:100%;max-width:560px;margin:0 auto;
       padding:18px 16px calc(env(safe-area-inset-bottom) + 24px);
       display:flex;flex-direction:column;}

  .search{display:flex;gap:10px;align-items:stretch;}
  .search input{flex:1;min-width:0;font-size:26px;padding:16px 18px;border:2px solid #d4deec;border-radius:16px;
                text-align:center;outline:none;background:#fff;-webkit-user-select:text;user-select:text;
                box-shadow:0 2px 8px rgba(30,70,140,.06);transition:.15s;}
  .search input:focus{border-color:#2a7de1;box-shadow:0 0 0 4px rgba(42,125,225,.15);}
  .mic{flex:0 0 auto;width:62px;border:2px solid #d4deec;border-radius:16px;background:#fff;font-size:24px;cursor:pointer;transition:.12s;}
  .mic:hover{border-color:#2a7de1;}
  .mic:active{transform:scale(.94);}
  .mic.listening{background:#ffe3e3;border-color:#d1495b;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

  .card{margin-top:18px;flex:1;background:#fff;border-radius:22px;box-shadow:0 6px 24px rgba(30,70,140,.10);
        padding:18px;text-align:center;display:none;flex-direction:column;align-items:center;justify-content:center;}
  .card.show{display:flex;}
  .card.show ~ .hint{display:none;}
  .gif-wrap{margin:4px auto;flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;}
  .gif-wrap img{max-width:100%;max-height:100%;width:auto;height:auto;border-radius:14px;background:#fff;image-rendering:auto;}
  .placeholder{color:#9aa4b3;font-size:16px;}
  .audio-row{margin-top:14px;}
  .audio-row button{font-size:18px;padding:14px 34px;border:none;border-radius:30px;background:#26a96a;color:#fff;
                    cursor:pointer;font-weight:600;box-shadow:0 4px 12px rgba(38,169,106,.3);transition:.12s;}
  .audio-row button:hover{background:#1f8b58;}
  .audio-row button:active{transform:scale(.96);}
  .audio-row button:disabled{background:#b7c2cf;cursor:not-allowed;box-shadow:none;}
  .audio-msg{margin-top:8px;min-height:1.2em;font-size:13px;color:#d1495b;}

  .hint{margin-top:48px;text-align:center;color:#9aa4b3;font-size:16px;line-height:2;}
  .hint .big{font-size:46px;display:block;margin-bottom:8px;}

  /* 手機螢幕調整 */
  @media (max-width:480px){
    .appbar{padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;}
    .appbar h1{font-size:18px;letter-spacing:1px;}
    .appbar .sub{font-size:11px;}
    main{padding:14px 12px calc(env(safe-area-inset-bottom) + 14px);}
    .search input{font-size:23px;padding:14px 14px;}
    .mic{width:56px;font-size:22px;}
    .card{margin-top:14px;padding:14px;border-radius:18px;}
    .audio-row button{font-size:17px;padding:13px 30px;}
    .hint{margin-top:30px;font-size:15px;}
    .hint .big{font-size:40px;}
  }
  @media (max-height:560px){
    .hint{margin-top:16px;}
    .card{margin-top:12px;}
  }
</style>
</head>
<body>
  <header class="appbar">
    <span class="logo">&#9999;&#65039;</span>
    <h1>筆順讀音</h1>
    <span class="sub">輸入國字查詢 · v5</span>
  </header>

  <main>
    <div class="search">
      <input id="charInput" type="text" placeholder="輸入或說出國字" autocomplete="off">
      <button id="micBtn" class="mic" type="button" title="語音輸入">&#127908;</button>
    </div>

    <div class="card" id="card">
      <div class="gif-wrap" id="gifWrap"></div>
      <div class="audio-row">
        <button id="playBtn" type="button">&#128266; 播放讀音</button>
        <div class="audio-msg" id="audioMsg"></div>
      </div>
    </div>

    <div class="hint">
      <span class="big">&#128221;</span>
      輸入一個國字，<br>查看筆順動畫並聆聽讀音
    </div>
  </main>

var inEl = document.getElementById("charInput");
var card = document.getElementById("card");
var gifWrap = document.getElementById("gifWrap");
var playBtn = document.getElementById("playBtn");
var audioMsg = document.getElementById("audioMsg");

// 單一可重用的音訊元素（iOS 對重複 new Audio() 支援不佳）
var audio = document.createElement("audio");
audio.preload = "auto";
audio.setAttribute("playsinline", "");
audio.setAttribute("webkit-playsinline", "");
var audioSrc = null;

// iOS Safari 規定：音訊必須先在「使用者手勢」中解鎖，之後才能用程式播放
var audioUnlocked = false;
var SILENT_WAV = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=";
function unlockAudio(){
  if(audioUnlocked){ return; }
  audioUnlocked = true;
  try{
    // 已載入讀音時不可把 src 蓋掉，否則播放鈕會播到無聲檔
    if(!audioSrc){ audio.src = SILENT_WAV; }
    var p = audio.play();
    if(p && p.then){ p.catch(function(){}); }
  }catch(e){}
}
["touchend", "pointerdown", "mousedown", "keydown"].forEach(function(ev){
  document.addEventListener(ev, unlockAudio, true);
});

var lastCh = null;
var reqId = 0;

function pad4(s){ while(s.length < 4){ s = "0" + s; } return s; }

function lookup(ch){
  if(ch === lastCh){ return; }
  lastCh = ch;
  var code = STROKE[ch];
  var hex = pad4(ch.codePointAt(0).toString(16).toLowerCase());
  var gifUrl = "https://www.twpen.com/bishun-animation/" + hex + "-stroke-order.gif";

  reqId++;
  var myId = reqId;
  gifWrap.innerHTML = "";
  var img = new Image();
  img.alt = ch;
  img.onerror = function(){
    if(myId !== reqId){ return; }
    var d = document.createElement("div");
    d.className = "placeholder";
    d.textContent = "查無此字的筆順動畫";
    gifWrap.innerHTML = "";
    gifWrap.appendChild(d);
  };
  img.src = gifUrl;
  gifWrap.appendChild(img);

  audio.pause();
  audioMsg.textContent = "";
  if(code){
    audioSrc = "https://stroke-order.learningweb.moe.edu.tw/sound/" + code + ".mp3";
    audio.src = audioSrc;
    playBtn.disabled = false;
    var pp = audio.play();
    if(pp && pp.then){ pp.catch(function(){}); }
  } else {
    audioSrc = null;
    playBtn.disabled = true;
  }
  card.classList.add("show");
}

function doSearch(){
  var raw = inEl.value.trim();
  if(!raw){ return; }
  lookup(Array.from(raw)[0]);
}

var composing = false;
inEl.addEventListener("compositionstart", function(){ composing = true; });
inEl.addEventListener("compositionend", function(){ composing = false; doSearch(); });
inEl.addEventListener("keydown", function(e){ if(e.key === "Enter"){ doSearch(); } });
inEl.addEventListener("input", function(){ if(!composing){ doSearch(); } });

var micBtn = document.getElementById("micBtn");
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  var rec = null;
  var listening = false;
  var heard = "";

  function setListening(on){
    listening = on;
    micBtn.classList.toggle("listening", on);
  }

  function applyHeard(){
    var said = (heard || "").replace(/[\s，。、！？．,.!?]/g, "");
    heard = "";
    if(said){
      inEl.value = said;
      lookup(Array.from(said)[0]);
    }
  }

  function dropRec(){
    if(!rec){ return; }
    rec.onstart = rec.onend = rec.onerror = rec.onresult = null;
    try{ rec.abort(); }catch(e){}
    rec = null;
  }

  function stopPlayback(){
    try{ audio.pause(); }catch(e){}
    if(window.speechSynthesis){ try{ speechSynthesis.cancel(); }catch(e){} }
  }

  function startRec(){
    // 手機上重複使用同一個實例容易卡住，每次都建新的
    dropRec();
    rec = new SR();
    rec.lang = "zh-TW";
    rec.interimResults = true;   // 手機端只等 final 常收不到結果
    rec.maxAlternatives = 1;
    heard = "";
    rec.onstart = function(){ setListening(true); };
    rec.onend = function(){ setListening(false); applyHeard(); };
    rec.onerror = function(){ setListening(false); };
    rec.onresult = function(e){
      var t = "";
      for(var i = 0; i < e.results.length; i++){
        t += e.results[i][0].transcript || "";
      }
      heard = t;
      if(e.results[e.results.length - 1].isFinal){ applyHeard(); }
    };
    try{
      rec.start();
      setListening(true);   // 有些手機 onstart 很慢，先給視覺回饋
    }catch(e){
      dropRec();
      setListening(false);
    }
  }

  micBtn.addEventListener("click", function(){
    // 不論開始或停止，按下麥克風就先停掉播放中的聲音
    stopPlayback();
    if(listening){
      setListening(false);
      if(rec){ try{ rec.stop(); }catch(e){} }
      return;
    }
    startRec();
  });
} else {
  micBtn.disabled = true;
  micBtn.title = "此瀏覽器不支援語音輸入";
}
// 保底方案：mp3 播不出來時改用系統語音合成唸出這個字
function speakFallback(){
  try{
    if(!window.speechSynthesis || !lastCh){ return; }
    var u = new SpeechSynthesisUtterance(lastCh);
    u.lang = "zh-TW";
    u.rate = 0.8;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }catch(e){}
}

playBtn.addEventListener("click", function(){
  if(!audioSrc){ return; }
  audioMsg.textContent = "";
  // src 可能被解鎖用的無聲檔蓋掉或載入失敗，點擊時一律確認再播
  if(audio.src !== audioSrc){ audio.src = audioSrc; }
  try{ audio.currentTime = 0; }catch(e){}
  var pp = audio.play();
  if(pp && pp.then){
    pp.catch(function(){
      // 失敗時趁還在使用者手勢內重新載入再播一次
      audio.src = audioSrc;
      audio.load();
      var pp2 = audio.play();
      if(pp2 && pp2.then){
        pp2.catch(function(err){
          audioMsg.textContent = "音檔播放失敗（" + (err && err.name ? err.name : "未知") + "），改用語音合成";
          speakFallback();
        });
      }
    });
  }
});
inEl.focus();

if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("./sw.js").then(function(reg){
      if(reg && reg.update){ reg.update(); }
    }).catch(function(){});
  });
  // 新版 service worker 接手時重新載入一次，立即換到新版頁面
  var swReloaded = false;
  navigator.serviceWorker.addEventListener("controllerchange", function(){
    if(swReloaded){ return; }
    swReloaded = true;
    location.reload();
  });
}
</script>
