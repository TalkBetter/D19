<title>注音猜詞小考</title>
<style>
  :root {
    --board: #1b2b26;
    --board-2: #142019;
    --board-3: #223832;
    --chalk-white: #eef2ea;
    --chalk-yellow: #f4d35e;
    --chalk-dust: #8fb3a3;
    --paper: #efe9d8;
    --paper-shadow: #d9d0b4;
    --paper-line: #c94f3f;
    --paper-ink: #2a2622;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--board);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    padding: 3vh 4vw 3.5vh;
    font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", "Heiti TC", sans-serif;
    color: var(--chalk-white);
    position: relative;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 120% 90% at 50% 0%, var(--board-3) 0%, var(--board) 55%, var(--board-2) 100%);
  }

  .dust-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.5;
    mix-blend-mode: overlay;
    filter: url(#dust);
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 900px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 0;
  }

  .meta-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: ui-monospace, "Cascadia Code", "Consolas", "SFMono-Regular", monospace;
    font-variant-numeric: tabular-nums;
    font-size: 0.8rem;
    color: var(--chalk-dust);
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  .meta-row b {
    color: var(--chalk-yellow);
    font-weight: 700;
  }

  .stage-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    padding: 2vh 0;
  }

  .clue {
    font-size: clamp(4rem, 21vw, 12rem);
    font-weight: 900;
    letter-spacing: 0.16em;
    line-height: 1;
    color: var(--chalk-white);
    filter: url(#chalk);
    text-shadow: 0 0 24px rgba(238,242,234,0.2);
    word-break: break-all;
    text-align: center;
    max-width: 100%;
  }

  .clue.writing {
    animation: chalk-in 0.5s ease both;
  }

  @keyframes chalk-in {
    from { opacity: 0; letter-spacing: 0.4em; }
    to { opacity: 1; letter-spacing: 0.16em; }
  }

  .answer-stage {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(1rem, 3vh, 1.75rem);
    background: var(--paper);
    color: var(--paper-ink);
    border-radius: 10px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.4), 0 2px 0 var(--paper-shadow);
    padding: clamp(1.25rem, 4vw, 2.5rem);
    animation: lay-down 0.32s ease both;
  }

  @keyframes lay-down {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .grid-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(0.5rem, 2vw, 1rem);
    flex-wrap: wrap;
  }

  .grid-box {
    width: clamp(4rem, 17vw, 8rem);
    height: clamp(4rem, 17vw, 8rem);
    border: 2px solid var(--paper-ink);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(2.2rem, 10vw, 4.8rem);
    font-weight: 700;
    background: #fbf8ee;
    flex-shrink: 0;
  }

  .grid-box::before,
  .grid-box::after {
    content: "";
    position: absolute;
    background: var(--paper-line);
    opacity: 0.55;
  }
  .grid-box::before {
    left: 50%; top: 0; bottom: 0; width: 0;
    border-left: 1px dashed var(--paper-line);
  }
  .grid-box::after {
    top: 50%; left: 0; right: 0; height: 0;
    border-top: 1px dashed var(--paper-line);
  }

  .grid-box span { position: relative; z-index: 1; }

  .alt-answers {
    text-align: center;
    font-size: clamp(0.9rem, 2vw, 1.15rem);
    line-height: 1.9;
    color: #55503f;
    border-top: 1px dashed var(--paper-line);
    padding-top: clamp(0.75rem, 2vh, 1.25rem);
    max-width: 46ch;
  }

  .alt-answers b {
    color: var(--paper-ink);
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .alt-answers .word {
    display: inline-block;
    margin: 0.15rem 0.4rem;
  }

  .btn-main {
    flex-shrink: 0;
    width: min(100%, 480px);
    margin-top: clamp(1rem, 3vh, 1.75rem);
    font-family: inherit;
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0.85em 1.4em;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid var(--chalk-yellow);
    background: var(--chalk-yellow);
    color: var(--board-2);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .btn-main:active { transform: translateY(1px); }

  .btn-main:hover { box-shadow: 0 0 20px rgba(244,211,94,0.45); }

  .btn-main:focus-visible {
    outline: 3px solid var(--chalk-white);
    outline-offset: 3px;
  }

  .hint {
    flex-shrink: 0;
    text-align: center;
    margin: 0.6rem 0 0;
    font-size: 0.72rem;
    color: rgba(143,179,163,0.75);
    letter-spacing: 0.03em;
  }
  .hint kbd {
    font-family: ui-monospace, "Cascadia Code", monospace;
    background: rgba(238,242,234,0.08);
    border: 1px solid rgba(238,242,234,0.25);
    border-radius: 3px;
    padding: 0.05em 0.4em;
    color: var(--chalk-white);
  }

  @media (prefers-reduced-motion: reduce) {
    .clue.writing, .answer-stage { animation: none !important; }
  }
</style>

<svg width="0" height="0" style="position:absolute">
  <filter id="chalk" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.018 0.9" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="dust" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3" result="n"/>
    <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.93  0 0 0 0 0.95  0 0 0 0 0.9  0 0 0 0.05 0"/>
  </filter>
</svg>

<div class="dust-overlay" aria-hidden="true"></div>

<main>
  <div class="meta-row">
    <span>第 <b id="qIndex">1</b> / <span id="qTotal">5000</span> 題</span>
    <span>本次已作答 <b id="answeredCount">0</b></span>
  </div>

  <div class="stage-wrap" id="stageWrap">
    <div class="clue writing" id="clueText">ㄎㄆ</div>
  </div>

  <button class="btn-main" id="btnMain" type="button">看答案</button>
  <p class="hint">按 <kbd>空白鍵</kbd> 也可以</p>
</main>

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  let deck = shuffle(QUESTIONS.map((q, i) => i));
  let pos = 0;
  let revealed = false;
  let answeredCount = 0;
  const seen = new Set();

  const stageWrap = document.getElementById('stageWrap');
  const qIndexEl = document.getElementById('qIndex');
  const qTotalEl = document.getElementById('qTotal');
  const answeredEl = document.getElementById('answeredCount');
  const btnMain = document.getElementById('btnMain');

  qTotalEl.textContent = QUESTIONS.length;

  function currentQuestion() {
    return QUESTIONS[deck[pos]];
  }

  function renderClue() {
    const q = currentQuestion();
    stageWrap.innerHTML = '<div class="clue writing" id="clueText">' + q.clue + '</div>';
  }

  function renderAnswer() {
    const q = currentQuestion();
    const main = q.answers[0];
    const rest = q.answers.slice(1);

    const boxes = main.split('').map(ch =>
      '<div class="grid-box"><span>' + ch + '</span></div>'
    ).join('');

    let altHtml = '';
    if (rest.length) {
      const shown = rest.slice(0, 24);
      altHtml = '<div class="alt-answers"><b>其他可能：</b>' +
        shown.map(w => '<span class="word">' + w + '</span>').join('、') +
        (rest.length > shown.length ? ' …' : '') +
        '</div>';
    }

    stageWrap.innerHTML =
      '<div class="answer-stage"><div class="grid-row">' + boxes + '</div>' + altHtml + '</div>';
  }

  function updateMeta() {
    qIndexEl.textContent = pos + 1;
    answeredEl.textContent = answeredCount;
  }

  function showQuestion() {
    revealed = false;
    btnMain.textContent = '看答案';
    renderClue();
    updateMeta();
  }

  function reveal() {
    revealed = true;
    const key = deck[pos];
    if (!seen.has(key)) {
      seen.add(key);
      answeredCount++;
    }
    renderAnswer();
    btnMain.textContent = '下一題';
    updateMeta();
  }

  function advance() {
    pos++;
    if (pos >= deck.length) {
      deck = shuffle(QUESTIONS.map((q, i) => i));
      pos = 0;
    }
    showQuestion();
  }

  function handleMainAction() {
    if (!revealed) {
      reveal();
    } else {
      advance();
    }
  }

  btnMain.addEventListener('click', handleMainAction);

  document.addEventListener('keydown', (e) => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      handleMainAction();
    }
  });

  showQuestion();
</script>
