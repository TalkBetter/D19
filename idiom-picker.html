    h1 { margin: 0 0 clamp(18px, 3vw, 24px); font-size: clamp(24px, 4vw, 38px); letter-spacing: .14em; }
    .card {
      min-height: clamp(270px, 43vw, 370px); display: grid; place-items: center;
      padding: clamp(24px, 5vw, 42px) clamp(16px, 5vw, 38px); border-radius: clamp(22px, 4vw, 30px); background: #fff;

    }
    #idiom {
      font-family: "Noto Serif TC", "PMingLiU", serif;
      font-weight: 700; font-size: clamp(52px, 12vw, 142px);
      line-height: 1.25; letter-spacing: .18em; padding-left: .18em;
      color: #172b4d; word-break: keep-all;
    }
    #idiom.hint {
      max-width: 100%; color: #62748d; font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      font-size: clamp(18px, 4.8vw, 28px); font-weight: 600; letter-spacing: .04em; padding-left: 0;
    }
    button {
      appearance: none; width: min(520px, 100%); min-height: 72px; margin-top: clamp(24px, 4vw, 30px); border: 0;
      border-radius: 18px; padding: 18px 28px; background: #146c94; color: white;
      font: inherit; font-size: clamp(22px, 3.5vw, 32px); font-weight: 800;
      letter-spacing: .12em; cursor: pointer; box-shadow: 0 8px 0 #0b4c6c, 0 14px 24px rgba(20,108,148,.26);
      transform: translateY(0); transition: transform .08s ease, box-shadow .08s ease, background .15s ease;
      touch-action: manipulation;
    }
    button:hover { background: #0f789f; }
    button:active { transform: translateY(7px); box-shadow: 0 1px 0 #0b4c6c, 0 5px 12px rgba(20,108,148,.2); }
    button:focus-visible { outline: 4px solid #f6b73c; outline-offset: 5px; }
    .count { min-height: 1.5em; margin: 20px 0 0; color: #52647b; font-size: clamp(15px, 2.5vw, 18px); }
    @media (max-width: 520px) {
      body { align-items: start; padding-top: max(28px, env(safe-area-inset-top)); }
      main { padding-top: min(6svh, 36px); }
      .card { min-height: min(48svh, 390px); }
      #idiom { font-size: clamp(50px, 15vw, 82px); letter-spacing: .14em; padding-left: .14em; }
      #idiom.hint { font-size: clamp(18px, 5.2vw, 25px); letter-spacing: .03em; }
      button { width: 100%; border-radius: 16px; }
    }
    @media (orientation: landscape) and (max-height: 620px) {
      body { padding-top: 16px; padding-bottom: 16px; }
      main { width: min(960px, 100%); }
      h1 { margin-bottom: 12px; font-size: 23px; }
      .card { min-height: 180px; padding: 18px; }
      #idiom { font-size: clamp(50px, 10vw, 92px); }
      button { min-height: 58px; margin-top: 18px; padding: 13px 25px; font-size: 23px; }
      .count { margin-top: 12px; }
    }
  </style>
