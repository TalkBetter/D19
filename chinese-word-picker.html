    const excluded=new Set(`可是 難怪 但是 而且 因為 所以 如果 雖然 然而 或者 還是 除了 以及 由於 因此 不過 於是 並且 甚至 尤其 另外 此外 其實 當然 原來 已經 正在 曾經 仍然 常常 往往 總是 一定 可能 也許 大概 非常 十分 更是 最為 幾乎 完全 一起 先後 立刻 馬上 終於 突然 剛剛 剛才 從來 一直 再度 再次 互相 各自 全部 任何 每個 這個 那個 什麼 怎麼 為何 哪裡 我的 你的 他的 她的 它的 我們 你們 他們 她們 自己 大家 有人 沒人 某些 一些 許多 很多 多少 所有 其中 其他 可以 應該 必須 需要 想要 要是 沒有 不是 好像 例如 比如 即使 只要 無論 不管 雖說 既然 否則 連同 對於 關於 至於 根據 按照 經過 透過 為了 同時 當時 此時 目前 以前 以後 之後 之間 仍舊 依然 大約 大量 特別 相當 比較 更加 最後 首先 其次 畢竟 簡直 絕對 必然 未必 幸好 反而 一旦 立即 依次 一概 各種 每次 整個 本來 將要 正要 都是 也是 是否 已是 仍是 這些 那些 哪些 什麼樣 怎麼樣 為什麼 誰們 哪個 幾個 多少個`.trim().split(/\s+/));
    const words=[...new Set([...cities,...vocabulary.filter(word=>word.length>=2&&word.length<=4&&!excluded.has(word))])];
    function shuffle(){for(let i=words.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[words[i],words[j]]=[words[j],words[i]]}}
    const minutesInput=document.getElementById('minutes');
    try{const savedMinutes=Number(localStorage.getItem('chinese-word-picker-minutes'));if(savedMinutes>=1&&savedMinutes<=60)minutesInput.value=savedMinutes}catch(error){}
    minutesInput.addEventListener('change',()=>{const value=Math.min(60,Math.max(1,Number(minutesInput.value)||3));minutesInput.value=value;try{localStorage.setItem('chinese-word-picker-minutes',value)}catch(error){}});
    let current=0,score=0,timeLeft=0,timerId=null,correctAnswers=[];
    function draw(){document.getElementById('word').textContent=words[current];document.getElementById('number').textContent=`第 ${current+1} 題／共 ${words.length} 題`}
    function next(){current++;if(current===words.length){shuffle();current=0}draw()}
    function showTime(){const minutes=Math.floor(timeLeft/60),seconds=String(timeLeft%60).padStart(2,'0');document.getElementById('timer').textContent=minutes+':'+seconds}
    function finish(){clearInterval(timerId);document.getElementById('game').classList.add('hidden');document.getElementById('finalScore').textContent=score;const list=document.getElementById('correctWords');list.innerHTML=correctAnswers.length?correctAnswers.map(word=>'<span>'+word+'</span>').join(''):'<span class="empty">沒有答對題目</span>';document.getElementById('result').classList.remove('hidden')}
    function startGame(){const minutes=Math.min(60,Math.max(1,Number(minutesInput.value)||3));minutesInput.value=minutes;try{localStorage.setItem('chinese-word-picker-minutes',minutes)}catch(error){}shuffle();current=0;score=0;correctAnswers=[];timeLeft=minutes*60;showTime();document.getElementById('score').textContent='0';document.getElementById('setup').classList.add('hidden');document.getElementById('result').classList.add('hidden');document.getElementById('game').classList.remove('hidden');draw();clearInterval(timerId);timerId=setInterval(()=>{timeLeft--;showTime();if(timeLeft<=0)finish()},1000)}
    document.getElementById('start').addEventListener('click',startGame);
    document.getElementById('correct').addEventListener('click',()=>{correctAnswers.push(words[current]);score++;document.getElementById('score').textContent=score;next()});
    document.getElementById('giveup').addEventListener('click',next);
    document.getElementById('restart').addEventListener('click',()=>{document.getElementById('result').classList.add('hidden');document.getElementById('setup').classList.remove('hidden')});
  </script>
